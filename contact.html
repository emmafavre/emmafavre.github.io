<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Emma's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

    <div class="sidebar left-sidebar">
        <div class="sidebar-nav">
            <a href="index.html" class="nav-link">HOME</a>
        </div>
    </div>

    <div class="sidebar right-sidebar">
        <div class="sidebar-nav">
            <a href="contact.html" class="nav-link">CONTACT</a>
            <a href="about-me.html" class="nav-link">ABOUT ME</a>
        </div>
    </div>

    <main class="main-content">
        <section class="contact-section">
            <h2 class="contact-title">CONTACT ME</h2>
            <p class="contact-email">
                <a href="mailto:favre-emma@outlook.fr">favre-emma@outlook.fr</a>
            </p>
            <p class="contact-linkedin">
                <a href="https://www.linkedin.com/in/emma-favre-875a9423b/" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-linkedin" aria-hidden="true"></i> LinkedIn
                </a>
            </p>
            <p class="contact-subtitle">Feel free to reach out for any opportunities or questions (づ￣ ³￣)づ </p>
            
            <div class="contact-form-container">
                <form id="contact-form" action="https://formspree.io/f/mzzvnqnj" method="POST">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required placeholder=" ">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" required placeholder=" ">
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required placeholder=" "></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            
                <div id="form-status" class="hidden">
                    Your message has been sent successfully! Thank you.
                </div>
            </div>
        </section>
    </main>

    <div class="copyright">
        <span>© 2025 Favre Emma's Portfolio</span>
    </div>

    <script src="script.js"></script>

</body>
</html>
